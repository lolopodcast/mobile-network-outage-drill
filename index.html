    m4_p2: "接著實際購買一樣東西——一杯飲料、一份便當都可以，觀察在沒有行動支付、叫車、外送與會員 App 的情況下，日常付款、叫車、外送是否仍可正常運作。你會發現，有些店家幾乎已經不收現金，這本身就是一個值得記錄的斷點。",
    m4_p3: "這一項的意義不只是「有沒有帶現金」，而是重新確認：當手機所有便利功能都失效時，你熟悉的日常動線裡，還有哪些環節仍然能運作。",

    m5_title: "電力備援",
    m5_overview: "斷網常伴隨停電或基地台限流，出門前把行動電源充飽，是所有其他備援方案的前提。",
    m5_highlights: ["行動電源", "備用電池", "前置條件", "停電風險"],
    m5_p1: "這是原始行動方案裡沒有明列、但實際演練時很快就會發現的落差：手機沒電，比手機沒訊號更早讓所有備援方案失效。無論簡訊格式、離線地圖、電子票券準備得多齊全，手機一旦沒電，全部都用不上。",
    m5_p2: "出門前確認行動電源已充飽電，家中也備妥備用電池，或手搖／太陽能充電設備作為更長時間停電時的備援。行動電源本身也要定期演練——很多人買了行動電源之後從沒真正用它幫手機充過電，直到需要的那一刻才發現線材不合或電量早已耗盡。",

    m6_title: "資訊查證素養",
    m6_overview: "無法即時查證時，先問三個問題，避免在通訊有限的情境下製造二次混亂。",
    m6_highlights: ["查證三問", "不急著轉傳", "先傳自身狀況", "避免二次混亂"],
    m6_p1: "收到資訊時，先問自己：這是官方通知、親眼所見，還是別人的轉述？現在真的需要立刻轉傳給其他人嗎？這兩個問題能快速過濾掉大部分未經查證、只是情緒性轉發的訊息。",
    m6_p2: "在斷網或通訊頻寬有限的情境下，每一則轉傳都會排擠真正需要傳遞的求助與安全訊息。無法查證時，優先傳送自己的位置、狀況與需求，而不是急著把看到的消息散布出去——你不確定的事情，對方同樣無法判斷真假，只會把不確定性一起傳下去。",

    m6_wrapup: "資訊查證素養的核心不是變得多疑，而是在有限的通訊資源下，把頻寬留給真正重要的求助與安全訊息。先查證、再轉傳；查不到，就先說自己的狀況。",
    m6_checklist: [

    m0_title: "If the Network Goes Down Tonight, Is Your Family Ready?",
    m0_intro: "A mobile network outage is not just weak signal — it is a scenario where phone calls, text messages, maps, and mobile payments can all fail at the same time. Community resilience is not an abstract slogan; it is built up from the concrete preparedness actions of every family and every individual. This action plan breaks the 'Urban Resilience — Mobile Network Outage Drill' into six preparedness dimensions: communication backup and rendezvous planning, spatial and route familiarity, offline data readiness, cash and physical payment backup, power backup, and information verification literacy. None of these are 'nice to know' facts — each one asks you to actually walk your evacuation route, actually test your offline files, actually pay for something with cash. The point of the drill is not to create anxiety, but to find, while the network still works today, the gaps between what you assume works and what actually works — for instance, discovering that the ID photo you thought was saved on your phone is really just a cloud thumbnail. Through repeated drills and record-keeping, you and your family can still know where everyone is, where to go, and how to get through the day when the network truly goes down.",
    m0_why: "Why Drill Now, Before It Happens?",
    m0_why_desc: "Waiting for an actual disaster or infrastructure failure to try living offline for the first time is too risky. Drilling now lets you test every backup plan under low-risk, everyday conditions and confirm it genuinely works.",

    m1_title: "Communication & Rendezvous",
    m1_overview: "Confirming contact details for family, partners and key colleagues, and agreeing on a message format plus a physical rendezvous point, is the first line of defense in any backup plan.",
    m1_highlights: ["Phone Numbers", "Message Format", "Rendezvous Point", "Agreed Time"],
    m1_p1: "Confirm phone numbers for family, partners and key colleagues in advance, and agree on a message format: \"I'm safe / Currently at __ / Heading to __ next / Will contact again around __.\" This format is short enough to send even on a weak connection, and lets the other person grasp your safety, location and next step in one message.",
    m1_p2: "But there's a critical gap to watch for: this approach assumes the mobile network is \"intermittently restored\" or that you can reach other Wi-Fi. If the mobile network is completely down, that text message won't go through either, and the agreed format becomes useless.",
    m1_p3: "Communication backup therefore needs a fallback that depends on no network at all: a physical rendezvous point and time. Agree in advance on where and when to meet if you truly cannot reach each other — the last line of defense when the message format fails.",
    m1_terms: [
      { front: "Message Format", back: "\"I'm safe / Currently at __ / Heading to __ next / Will contact again around __\" — works when the network intermittently returns or other Wi-Fi is reachable." },
      { front: "Physical Rendezvous Point", back: "The fallback when totally offline: agree in advance on a time and place to meet, independent of any network." },
      { front: "Intermittent Recovery", back: "A mobile outage isn't always 100% total — signal can come and go, which is exactly the scenario the message format is designed for." },
      { front: "Communication Gap", back: "Agreeing on a message format is not the same as a true network-outage fallback — the gap most easily overlooked." }
    ],
    m1_wrapup: "Communication backup isn't a contact list — it's two layers: a message format to report status quickly when the network briefly returns, and a physical rendezvous point and time as the fallback when it's fully down. Both are necessary; agreeing on a message format without a rendezvous point is the most common gap. Next step: tell everyone who matters to you exactly where and when to meet.",
    m1_checklist: [
      "Collected up-to-date phone numbers for family, partner, and key colleagues",
      "Confirmed the message format with them: safe / at / heading to / will contact by",
      "Agreed on a physical rendezvous point for when contact is completely lost",
      "Agreed on a meeting time for the rendezvous point (e.g., 18:00 same day, or reconfirm next day)",
      "Actually told everyone involved where the rendezvous point is (not just decided it alone)"
    ],

    m2_title: "Spatial & Route Familiarity",
    m2_overview: "Look up your nearest shelter and save a screenshot before the drill, then actually walk there during the drill to confirm the entrance, walking time, and alternate routes.",
    m2_highlights: ["Shelter Location", "Offline Screenshot", "Entrance", "Alternate Route"],
    m2_p1: "Before the drill, look up the location of your nearest shelter and save it as an actual screenshot in your phone's photo gallery — it must be a real image file, not just a \"starred location\" inside a maps app, or it will be just as unreachable once the network is down.",
    m2_p2: "During the drill, deliberately avoid using Google Maps and actually walk there. The point isn't to test your stamina — it's to confirm three things: where the entrance really is (many shelters' actual entrance differs from where the map marks it), how long the walk takes, and whether there's an alternate route you can find yourself if the main road is blocked.",
    m2_p3: "Once you've actually walked it, this information becomes part of your muscle memory, no longer dependent on any digital map.",
    m2_terms: [
      { front: "Shelter Screenshot", back: "Must be a real image file in your gallery, not just a \"saved place\" inside a maps app." },
      { front: "Entrance Location", back: "The real entrance often differs from what's marked on the map — only an actual walk confirms it." },
      { front: "Alternate Route", back: "A backup path for when the main road is blocked — must be scouted in advance, not improvised." },
      { front: "Muscle Memory", back: "A route you've physically walked becomes memory that no longer depends on any digital map." }
    ],
    m2_wrapup: "Spatial familiarity can't be replaced by a screenshot. The screenshot is only backup data — the real backup is that after walking it once, your body remembers where the entrance is, how long it takes, and which way to detour if the road is blocked. This can't be learned on the spot; it can only be drilled in advance.",
    m2_checklist: [
      "Found the nearest shelter and saved it as an image in your phone gallery (not just a map favorite)",
      "Actually walked to the shelter with mobile data off",
      "Confirmed the real entrance location (matches or differs from the map marker)",
      "Recorded the walking time from home to the shelter",
      "Identified an alternate route for when the main road is blocked"
    ],

    m3_title: "Offline Data Readiness",
    m3_overview: "Check whether the shelter maps, IDs, medical records, tickets and work documents on your phone truly work offline — not just appear to be there.",
    m3_highlights: ["Offline Maps", "ID Documents", "Medications", "E-Tickets", "Work Files"],
    m3_p1: "Check whether five categories of data on your phone work offline: shelter locations and offline maps, ID documents and emergency contacts, medical and medication records, tickets, accommodation addresses and e-tickets, and work documents plus your partners' contact list.",
    m3_p2: "Many files appear to already be on your phone but still need a cloud connection to download — cloud photo albums, cloud drives and ticket apps often only store a thumbnail or index locally, while the actual content has to be fetched online. Turn on airplane mode and open each file one by one to find out which ones actually won't open.",
    m3_p3: "This is the item in the whole plan most prone to false confidence: storage showing a file exists doesn't mean it will actually work once the network is down. The only way to verify it is to open it for real while offline.",

    m4_title: "Cash & Physical Payment Backup",

const FlipCardDeck = ({ terms, t, moduleId, onCardRead }) => {
  const [groupIdx, setGroupIdx] = useState(0);
  const [flipped, setFlipped] = useState({});
  const [readSet, setReadSet] = useState(new Set());
  const [shownSet, setShownSet] = useState(new Set());
  const [shuffledOrder] = useState(() => [...Array(terms.length).keys()].sort(() => Math.random() - 0.5));

  const groupSize = 2;
  const totalGroups = Math.ceil(terms.length / groupSize);
  const startIdx = groupIdx * groupSize;
  const currentCardIndices = shuffledOrder.slice(startIdx, startIdx + groupSize);

  useEffect(() => {
    const newShown = new Set(shownSet);
    currentCardIndices.forEach(idx => newShown.add(idx));
    if (newShown.size !== shownSet.size) setShownSet(newShown);
  }, [groupIdx]);

  const handleFlip = (origIdx) => {
    setFlipped(f => ({ ...f, [origIdx]: !f[origIdx] }));
    if (!readSet.has(origIdx)) {
      const newRead = new Set(readSet); newRead.add(origIdx); setReadSet(newRead);
      if (onCardRead) onCardRead(moduleId, newRead.size);
    }
  };

  const statusText = t.flip_status
    .replace('{read}', readSet.size).replace('{shown}', shownSet.size).replace('{total}', terms.length);

  return (
    <div className="mt-8">
      <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.key_terms}</h3>
      <p className="text-sm text-slate-400 mb-4">{statusText}</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {currentCardIndices.map((origIdx) => {
          const term = terms[origIdx];
          return (
            <div key={origIdx} className="perspective cursor-pointer h-36" onClick={() => handleFlip(origIdx)}>
              <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped[origIdx] ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
                  <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{term.front}</p>
                  <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
                  <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{term.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-3 mt-4">
        <button onClick={() => { setGroupIdx(0); setFlipped({}); }}
          className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          {t.flip_retry}
        </button>
        <button onClick={() => groupIdx < totalGroups - 1 && setGroupIdx(groupIdx + 1)}
          disabled={groupIdx >= totalGroups - 1}
          className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
          {t.flip_next}
        </button>
      </div>
    </div>
  );
};

const SmsGeneratorLab = ({ t, lang }) => {
  const [status, setStatus] = useState(t.lab_sms_status_safe);

  const [dest, setDest] = useState('');
  const [time, setTime] = useState('');
  const [copied, setCopied] = useState(false);
  const msg = lang === 'zh'
    ? `我${status}／目前在${loc || '＿＿'}／接下來前往${dest || '＿＿'}／預計${time || '＿＿'}點再次聯絡`
    : `I'm ${status} / Currently at ${loc || '__'} / Heading to ${dest || '__'} next / Will contact again around ${time || '__'}`;

      });
    }
    const csv = '﻿' + rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    a.href = url;
    a.download = `${dict.zh.brand}_${dict.zh.title}_演練紀錄_${stamp}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handleClear = () => {
    if (!window.confirm(t.mana_clear_confirm)) return;
    setChecklist({}); setCardsRead({});
    try { localStorage.removeItem('URD_checklist'); localStorage.removeItem('URD_cardsRead'); } catch (e) {}
  };

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { speechSynthesis.resume(); setTtsState('playing'); return; }
      speechSynthesis.cancel();
      const sep = '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc,
          ...(t.m0_stats || []).map(s => `${s.label}: ${s.val}`),
          ...(t.m0_modules || []).map(m => `${m.title}. ${m.desc}`)];
      } else if (module >= 1 && module <= NUM_LEARN) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], t[`${mk}_overview`],
          ...(t[`${mk}_highlights`] || []),
          t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`],
          ...(t[`${mk}_terms`] || []).flatMap(tm => [tm.front, tm.back]),
          t[`${mk}_wrapup`],
          ...(t[`${mk}_checklist`] || [])];
      } else if (module === IDX_LAB) {
        texts = [t.mlab_title, t.mlab_desc, ...(t.mlab_labs || []).map(l => `${l.title}. ${l.desc}`)];
      } else if (module === IDX_RES) {
        texts = [t.mres_title, t.mres_desc, ...(t.mres_links || []).map(l => l.label)];
      } else if (module === IDX_ANA) {
        texts = [t.mana_title, t.mana_desc, `${t.mana_stat_pct}: ${overallPct}%`];
      }
      texts = texts.filter(Boolean);
      const utt = new SpeechSynthesisUtterance(texts.join(sep));
      utt.rate = 0.95;
      const voices = speechSynthesis.getVoices();
      if (lang === 'zh') {
        const v = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Yating')) || voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
        if (v) utt.voice = v; utt.lang = 'zh-TW';
      } else {
        const v = voices.find(v => v.lang === 'en-GB' && (v.name.includes('Male') || v.name.includes('Daniel'))) || voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
        if (v) utt.voice = v; utt.lang = 'en-GB';
      }
      utt.onend = () => setTtsState('idle');
      utt.onerror = () => setTtsState('idle');
      speechSynthesis.speak(utt);
      setTtsState('playing');
    }
  };

  const BottomNav = () => (
    <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
      <button onClick={() => goto(Math.max(0, module - 1))} disabled={module === 0}
        className="px-4 py-2 text-sm font-bold text-[#004030] dark:text-[#D8C3A5] disabled:opacity-0">← {t.nav_prev}</button>
      <button onClick={() => goto(Math.min(TOTAL - 1, module + 1))} disabled={module === TOTAL - 1}
        className="px-4 py-2 text-sm font-bold text-[#004030] dark:text-[#D8C3A5] disabled:opacity-0">{t.nav_next} →</button>
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col">
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30 no-print">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-1 sm:gap-2 min-w-0">
            <div className="relative" ref={menuRef}>
              <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg" aria-label="menu"><IconMenu/></button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-72 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100]">
                  {modulesList.map(m => (
                    <button key={m.id} onClick={() => goto(m.id)}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm text-left hover:bg-slate-100 dark:hover:bg-slate-700 ${module === m.id ? 'text-[#004030] dark:text-[#D8C3A5] font-bold bg-slate-50 dark:bg-slate-900' : 'text-slate-700 dark:text-slate-200'}`}>
                      <span className="shrink-0">{m.icon}</span><span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={() => goto(0)} className="p-2 hover:bg-white/10 rounded-lg" aria-label="home"><IconHome size={18}/></button>
            <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="flex items-center gap-2 min-w-0">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest shrink-0">{t.brand}</span>
              <span className="hidden sm:inline font-serif font-bold text-sm md:text-base truncate">{t.title}</span>
            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2 shrink-0">
            {ttsState === 'idle' && <button onClick={() => handleTTS('play')} className="p-2 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={18}/></button>}
            {ttsState === 'playing' && <button onClick={() => handleTTS('pause')} className="p-2 hover:bg-white/10 rounded-lg"><IconPause size={18}/></button>}
            {ttsState === 'paused' && <button onClick={() => handleTTS('play')} className="p-2 hover:bg-white/10 rounded-lg"><IconPlay size={18}/></button>}
            {ttsState !== 'idle' && <button onClick={() => handleTTS('stop')} className="p-2 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>}
            <button onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')} className="px-2.5 py-1.5 text-xs font-bold border border-white/30 rounded-lg hover:bg-white/10">{lang === 'zh' ? 'EN' : '中'}</button>
            <button onClick={() => setIsDark(!isDark)} className="p-2 hover:bg-white/10 rounded-lg">{isDark ? <IconSun size={18}/> : <IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      <div className="flex-1 flex pt-16 max-w-7xl mx-auto w-full">
        <aside className="hidden md:block w-64 shrink-0 border-r border-slate-200 dark:border-slate-800 p-4 no-print">
          <nav className="space-y-1 sticky top-20">
            {modulesList.map(m => (
              <button key={m.id} onClick={() => goto(m.id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left transition-colors ${module === m.id ? 'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-bold' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                <span className="shrink-0">{m.icon}</span><span className="truncate">{m.title}</span>
              </button>
            ))}
          </nav>
        </aside>

        <main className="flex-1 min-w-0 px-4 sm:px-6 lg:px-10 py-8 sm:py-10 overflow-x-hidden">
          {module === 0 && (
            <div key="m-0" className="space-y-10 animate-fade-in">
              <div className="rounded-3xl overflow-hidden bg-[#004030] text-white p-8 sm:p-12">
                <p className="text-[#D8C3A5] font-bold tracking-widest text-sm mb-3">{t.brand} · {t.subtitle}</p>
                <h1 className="font-serif font-black text-3xl sm:text-5xl mb-4 leading-tight">{t.m0_title}</h1>
                <p className="text-white/85 leading-relaxed max-w-3xl">{t.m0_intro}</p>
                <button onClick={() => goto(1)} className="mt-6 inline-flex items-center gap-2 px-6 py-3 bg-[#D8C3A5] text-[#004030] font-bold rounded-xl hover:brightness-95">
                  {t.m0_start} <IconArrowRight size={18}/>
                </button>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                {t.m0_stats.map((s, i) => <StatCard key={i} label={s.label} value={s.val}/>)}
              </div>
              <div className="bg-slate-100 dark:bg-slate-800 rounded-2xl p-6">
                <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-2">{t.m0_why}</h3>
                <p className="text-slate-600 dark:text-slate-300">{t.m0_why_desc}</p>
              </div>
              <div>
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">{t.overview_label}</h3>
                <div className="space-y-3">
                  {t.m0_modules.map((m, i) => (
                    <button key={i} onClick={() => goto(i + 1)}
                      className="w-full flex items-center gap-4 text-left bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] transition-all">
                      <span className="font-serif font-black text-2xl text-[#D8C3A5] shrink-0">{m.num}</span>
                      <span className="flex-1 min-w-0">
                        <span className="block font-bold text-[#004030] dark:text-[#D8C3A5]">{m.title}</span>
                        <span className="block text-sm text-slate-500 dark:text-slate-400">{m.desc}</span>
                      </span>
                      <IconChevronRight className="text-slate-400 shrink-0"/>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {module >= 1 && module <= NUM_LEARN && (
            <div key={`m-${module}`} className="space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
              <H2 icon={modulesList[module].icon} number={modulesList[module].num}>{t[`m${module}_title`]}</H2>
              <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border-l-4 border-[#D8C3A5]">
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.overview_label}</h3>
                <p>{t[`m${module}_overview`]}</p>
              </div>
              <div>
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t.highlights_label}</h3>
                <div className="flex flex-wrap gap-2">
                  {t[`m${module}_highlights`].map((h, i) => (
                    <span key={i} className="px-3 py-1 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] rounded-full text-sm font-medium">{h}</span>
                  ))}
                </div>
              </div>
              <div className="space-y-4">
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t.deep_dive_label}</h3>
                <p>{t[`m${module}_p1`]}</p>
                <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif">{t[`m${module}_p2`]}</p>
                <p>{t[`m${module}_p3`]}</p>
              </div>
              <FlipCardDeck key={`cards-${module}`} terms={t[`m${module}_terms`]} t={t} moduleId={module} onCardRead={handleCardRead}/>
              <div className="bg-slate-100 dark:bg-slate-800 rounded-xl p-5">
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.wrapup_label}</h3>
                <p className="italic">{t[`m${module}_wrapup`]}</p>
              </div>
              <ChecklistCard key={`checklist-${module}`} items={t[`m${module}_checklist`]} t={t} moduleId={module} checklistState={checklist} onToggle={handleToggleCheck}/>
              <BottomNav/>
            </div>
          )}

          {module === IDX_LAB && (
            <div key="m-lab" className="space-y-8 animate-fade-in">
              <H2 icon={modulesList[NUM_LEARN + 1].icon} number={modulesList[NUM_LEARN + 1].num}>{t.mlab_title}</H2>
              <p className="text-slate-600 dark:text-slate-300 text-lg">{t.mlab_desc}</p>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <SmsGeneratorLab t={t} lang={lang}/>
                <CashCalcLab t={t}/>
                <PowerBankLab t={t}/>
                <ReadinessRadarLab t={t} checklist={checklist} dict={dict} lang={lang}/>
              </div>
              <BottomNav/>
            </div>
          )}

          {module === IDX_RES && (
            <div key="m-res" className="space-y-6 animate-fade-in">
              <H2 icon={modulesList[NUM_LEARN + 2].icon} number={modulesList[NUM_LEARN + 2].num}>{t.mres_title}</H2>
              <p className="text-slate-600 dark:text-slate-300 text-lg">{t.mres_desc}</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {t.mres_links.map((l, i) => <LinkCard key={i} label={l.label} url={l.url} desc={l.desc}/>)}
              </div>
              <BottomNav/>
            </div>
          )}

          {module === IDX_ANA && (
            <div key="m-ana" className="space-y-8 animate-fade-in">
              <H2 icon={modulesList[NUM_LEARN + 3].icon} number={modulesList[NUM_LEARN + 3].num}>{t.mana_title}</H2>
              <p className="text-slate-600 dark:text-slate-300 text-lg">{t.mana_desc}</p>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <StatCard label={t.mana_stat_total} value={allChecklistTotal}/>
                <StatCard label={t.mana_stat_done} value={allChecklistDone}/>
                <StatCard label={t.mana_stat_pct} value={`${overallPct}%`}/>
                <StatCard label={t.mana_stat_cards} value={totalCardsRead}/>
              </div>
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.mana_progress_title}</h3>
                <div className="space-y-4">
                  {[1, 2, 3, 4, 5, 6].map(m => {
                    const total = (t[`m${m}_checklist`] || []).length;
                    const done = checklist[m] ? checklist[m].filter(Boolean).length : 0;
                    const pct = total ? Math.round((done / total) * 100) : 0;
                    return (
                      <button key={m} onClick={() => goto(m)} className="w-full text-left">
                        <div className="flex justify-between text-sm mb-1">
                          <span className="font-medium text-slate-700 dark:text-slate-300">{t[`m${m}_title`]}</span>
                          <span className="text-slate-400">{done}/{total}</span>
                        </div>
                        <div className="w-full h-2.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                          <div className="h-full bg-[#004030] dark:bg-[#D8C3A5]" style={{ width: `${pct}%` }}/>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="flex flex-wrap gap-3">
                <button onClick={handleExport} className="px-5 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg text-sm">{t.mana_export}</button>
                <button onClick={handleClear} className="px-5 py-2.5 border border-red-400 text-red-500 font-bold rounded-lg text-sm">{t.mana_clear}</button>
              </div>
              <p className="text-xs text-slate-400">{t.mana_saved_note}</p>
              <BottomNav/>
            </div>
          )}
        </main>
      </div>

      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0 no-print">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span>{t.architect_label}&nbsp;{t.architect_name}</span>
          <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="text-[#D8C3A5] hover:text-white font-bold">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
